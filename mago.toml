#:schema https://mago.carthage.software/1.30.0/schema.json
# Welcome to Mago!
# For full documentation, see https://mago.carthage.software/1.30.0/en/tools/overview/
version = "1"
php-version = "8.0.0"

[source]
workspace = "."
paths = ["src", "tests"]
includes = ["vendor"]
excludes = []

[source.glob]
literal-separator = true

[formatter]
preset = "psr-12"

[linter]
integrations = ["symfony", "phpunit"]

[linter.rules]
ambiguous-function-call = { enabled = false }
literal-named-argument = { enabled = false }
halstead = { effort-threshold = 7000 }
identity-comparison = { enabled = true }
strict-behavior = { enabled = true }
# 风格类规则 — 宽松模式，不强制
no-empty = { enabled = false }
no-isset = { enabled = false }
cyclomatic-complexity = { enabled = false }
too-many-methods = { enabled = false }
kan-defect = { enabled = false }
excessive-parameter-list = { enabled = false }
no-sprintf-concat = { enabled = false }
no-multi-assignments = { enabled = false }
prefer-arrow-function = { enabled = false }
prefer-static-closure = { enabled = false }
tagged-todo = { enabled = false }
strict-types = { enabled = false }
single-class-per-file = { enabled = false }
assertion-style = { enabled = false }
no-error-control-operator = { enabled = false }
no-global = { enabled = false }
no-else-clause = { enabled = false }
no-redundant-use = { enabled = false }

[analyzer]
plugins = []
find-unused-definitions = false
find-unused-expressions = false
analyze-dead-code = false
memoize-properties = true
allow-possibly-undefined-array-keys = true
check-throws = false
unchecked-exceptions = ["Error", "LogicException"]
unchecked-exception-classes = []
check-missing-override = false
find-unused-parameters = false
strict-list-index-checks = false
strict-array-index-existence = false
allow-array-truthy-operand = false
no-boolean-literal-comparison = false
check-missing-type-hints = false
register-super-globals = true